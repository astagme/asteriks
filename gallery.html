<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asteriks | Gallery</title>

    <link rel="icon" type="image/png" sizes="32x32" href="asteriks.art/asteriksfav.png">

    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

    <style>
        :root {
            --c1: #ABC0F6;
            --c2: #C7D6F7;
            --c3: #D5D9F2;
            --c4: #E4E2F8;
            --c5: #E1EDF6;
            --dark: #55627C;
            --white: #ffffff;
            --shadow: 0 20px 40px rgba(119,136,187,.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Nunito', sans-serif;
            color: var(--dark);
            overflow-x: hidden;
            background:
                radial-gradient(circle at top left, rgba(255,255,255,.95), transparent 35%),
                linear-gradient(135deg, var(--c5), var(--c4), var(--c2));
            min-height: 100vh;
            cursor: url('asteriks.art/paw.png') 16 16, auto;
            animation: fadeIn 0.6s ease-in-out forwards;
            user-select: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            z-index: -10;
            opacity: .5;
            animation: float 10s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-30px); }
        }

        header {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: min(1200px, 92%);
            z-index: 999;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 26px;
            border-radius: 30px;
            background: rgba(255, 255, 255, .45);
            border: 1px solid rgba(255, 255, 255, .7);
            backdrop-filter: blur(18px);
            box-shadow: var(--shadow);
        }

        .nav-links a {
            text-decoration: none;
            color: var(--dark);
            font-weight: 700;
            transition: .3s;
        }

        .nav-links a:hover { color: #7E98E7; }

        .gallery-hero {
            padding: 110px 7% 40px;
            text-align: center;
        }

        .filters {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-top: 50px;
        }

        .filter-btn {
            border: none;
            background: rgba(255, 255, 255, .65);
            backdrop-filter: blur(12px);
            padding: 14px 22px;
            border-radius: 999px;
            font-weight: 800;
            transition: .3s ease;
            box-shadow: var(--shadow);
        }

        .filter-btn:hover,
        .filter-btn.active {
            transform: translateY(-4px);
            background: white;
            color: #7E98E7;
        }

        /* =========================
           GRID
        ========================= */
        .gallery-grid {
            columns: 2 350px;
            column-gap: 30px;
            max-width: 1200px;
            margin: auto;
        }

        /* ===== FIXED CARD ANIMATION ===== */
        .art-card {
            break-inside: avoid;
            margin-bottom: 30px;
            border-radius: 34px;
            overflow: hidden;
            background: white;
            box-shadow: var(--shadow);
            position: relative;

            /* ключевой фикс */
            opacity: 0;
            transform: translateY(18px) scale(0.98);
            transition:
                transform 0.6s cubic-bezier(0.22, 1, 0.36, 1),
                opacity 0.6s cubic-bezier(0.22, 1, 0.36, 1),
                box-shadow 0.35s ease;
        }

        .art-card.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .art-card:hover {
            transform: translateY(-8px) scale(1.01);
            box-shadow: 0 25px 60px rgba(126,152,231,.2);
        }

        .art-card img {
            width: 100%;
            display: block;
            transition: transform .5s ease;
        }

        .art-card:hover img {
            transform: scale(1.03);
        }

        .art-overlay {
            padding: 20px;
            background: white;
        }

        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(30, 35, 50, .7);
            backdrop-filter: blur(14px);
            display: none;
            align-items: center;
            justify-content: center;
        }

        .lightbox.active { display: flex; }

        .lightbox-content {
            animation: popup .35s ease;
        }

        @keyframes popup {
            from { transform: scale(.85); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .lightbox img {
            max-width: 95vw;
            max-height: 92vh;
            border-radius: 24px;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            border: none;
            border-radius: 14px;
            background: white;
            cursor: pointer;
            transition: .3s;
        }

        .close-btn:hover { transform: rotate(90deg); }

        footer {
            text-align: center;
            padding: 40px 20px;
        }
    </style>
</head>

<body>

<header>
    <nav>
        <div class="logo">Asteriks</div>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">Gallery</a>
        </div>
    </nav>
</header>

<section class="gallery-hero">

    <div class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="portrait">Portraits</button>
        <button class="filter-btn" data-filter="fullbody">Fullbody</button>
        <button class="filter-btn" data-filter="couple">Couple</button>
    </div>
</section>

<section class="gallery">
    <div class="gallery-grid">

        <div class="art-card" data-category="portrait">
            <img src="asteriks.art/asteriks3.png">
            <div class="art-overlay">Pastel Necomimi</div>
        </div>

        <div class="art-card" data-category="couple">
            <img src="asteriks.art/asteriks4.png">
            <div class="art-overlay">City Duo</div>
        </div>

        <div class="art-card" data-category="fullbody">
            <img src="asteriks.art/asteriks2.png">
            <div class="art-overlay">Goth OC</div>
        </div>

        <div class="art-card" data-category="fullbody">
            <img src="asteriks.art/asteriks1.png">
            <div class="art-overlay">Identity</div>
        </div>

    </div>
</section>

<div class="lightbox" id="lightbox">
    <div class="lightbox-content">
        <button class="close-btn" id="closeBtn">✕</button>
        <img id="lightboxImg">
    </div>
</div>

<script>
const filterButtons = document.querySelectorAll('.filter-btn');
const cards = document.querySelectorAll('.art-card');

function showCards(list) {
    list.forEach((card, i) => {
        card.hidden = false;
        requestAnimationFrame(() => {
            setTimeout(() => {
                card.classList.add('show');
            }, i * 80);
        });
    });
}

function hideCard(card) {
    card.classList.remove('show');
    setTimeout(() => {
        card.hidden = true;
    }, 400);
}

filterButtons.forEach(btn => {
    btn.addEventListener('click', () => {

        filterButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const filter = btn.dataset.filter;

        cards.forEach(card => {
            const match = filter === 'all' || card.dataset.category === filter;

            if (match) {
                card.hidden = false;
                requestAnimationFrame(() => card.classList.add('show'));
            } else {
                hideCard(card);
            }
        });
    });
});

window.addEventListener('load', () => {
    showCards(Array.from(cards));
});
</script>

</body>
</html>
