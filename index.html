<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asteriks ✦ Furry Art Studio</title>

    <link rel="icon" type="image/png" sizes="32x32" href="asteriks.art/asteriksfav.png">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

    <style>
        /* ======================================================
           ROOT
        ====================================================== */
        :root {
            --c1: #ABC0F6;
            --c2: #C7D6F7;
            --c3: #D5D9F2;
            --c4: #E4E2F8;
            --c5: #E1EDF6;
            --dark: #55627C;
            --white: #ffffff;
            --shadow: 0 15px 35px rgba(119,136,187,.12);
            --inner-shadow: inset 0 2px 4px rgba(255,255,255,0.6);
            --glow-color: rgba(154, 175, 239, 0.35);
        }

        /* ======================================================
           GLOBAL & BASE WITH SMOOTH FADE IN
        ====================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Nunito', sans-serif;
            color: var(--dark);
            overflow-x: hidden;
            
            background: 
                radial-gradient(circle at top left, rgba(255,255,255,.95), transparent 45%),
                linear-gradient(135deg, var(--c5), var(--c4), var(--c2));
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.25) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.25) 1px, transparent 1px),
                linear-gradient(135deg, var(--c5), var(--c4), var(--c2));
            background-size: 40px 40px, 40px 40px, 100% 100%;
            
            min-height: 100vh;
            user-select: none;
            -webkit-user-select: none;
            
            /* Дефолтная лапка для всей страницы */
            cursor: url('asteriks.art/paw.png') 16 16, auto;
            
            /* Настройка плавности страницы */
            opacity: 0; 
            animation: pageFadeIn 0.7s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        @keyframes pageFadeIn {
            0% {
                opacity: 0;
                transform: translateY(10px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: radial-gradient(rgba(255,255,255,.45) 1.5px, transparent 1.5px);
            background-size: 32px 32px;
            opacity: .6;
            z-index: -20;
            pointer-events: none;
        }

        .bg-glow {
            position: fixed;
            top: 20%;
            right: -10%;
            width: 550px;
            height: 550px;
            background: radial-gradient(circle, rgba(171, 192, 246, 0.4) 0%, rgba(0,0,0,0) 70%);
            filter: blur(90px);
            z-index: -15;
            pointer-events: none;
        }

        /* Наведение на кликабельные элементы: лапка-указатель */
        a, button, .btn, .price-card, .badge-btn, .commission-badge {
            cursor: url('asteriks.art/paw-pointer.png') 16 16, pointer !important;
        }

        /* Эффект физического клика */
        a:active, button:active, .btn:active, .price-card:active, .badge-btn:active, .commission-badge:active {
            cursor: url('asteriks.art/paw-pointer.png') 12 12, pointer !important;
        }

        /* Явное удержание обычной лапки на некликабельных инфо-карточках */
        .info-subcard {
            cursor: url('asteriks.art/paw.png') 16 16, auto !important;
        }

        /* ======================================================
           BLOBS
        ====================================================== */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -10;
            opacity: .5;
            animation: float 12s ease-in-out infinite;
        }

        .blob1 { width: 350px; height: 350px; background: var(--c1); top: -8px; left: -100px; }
        .blob2 { width: 400px; height: 400px; background: var(--c4); right: -100px; bottom: -100px; animation-delay: 2s; }

        @keyframes float {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }

        /* ======================================================
           NAVIGATION
        ====================================================== */
        header {
            width: min(1200px, 92%);
            margin: 25px auto 0;
            z-index: 999;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 28px;
            border-radius: 32px;
            background: rgba(255, 255, 255, .6);
            border: 1px solid rgba(255, 255, 255, .7);
            backdrop-filter: blur(20px);
            box-shadow: var(--shadow);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Fredoka', sans-serif;
            font-size: 1.35rem;
            font-weight: 600;
            text-decoration: none;
            color: var(--dark);
            transition: transform 0.2s ease;
        }
        
        .logo:hover {
            transform: scale(1.02);
        }

        .logo img {
            height: 2rem;
            width: auto;
            pointer-events: none;
        }

        .nav-links {
            display: flex;
            gap: 24px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--dark);
            font-weight: 700;
            font-size: 0.95rem;
            transition: .25s;
        }

        .nav-links a:hover {
            color: #8CA4E8;
        }

        .commission-badge {
            padding: 10px 20px;
            border-radius: 20px;
            background: #9AAFEF;
            font-weight: 800;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            color: white;
            box-shadow: 0 8px 20px rgba(154,175,239,.3);
            transition: .3s;
            text-decoration: none;
            display: inline-block;
        }

        .commission-badge:hover {
            transform: translateY(-2px);
            background: #8CA4E8;
            box-shadow: 0 12px 25px rgba(140,164,232,.4);
        }

        /* ======================================================
           DASHBOARD CONTAINER (MAIN GRID)
        ====================================================== */
        .dashboard-container {
            width: min(1200px, 92%);
            margin: 30px auto 40px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* ======================================================
           ROW 1: HERO BANNER
        ====================================================== */
        .hero-banner {
            background: rgba(255, 255, 255, .45);
            border: 1px solid rgba(255, 255, 255, .75);
            border-radius: 40px;
            padding: 40px 60px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(15px);
            display: grid;
            grid-template-columns: 1.2fr 1fr 1fr;
            align-items: center;
            gap: 30px;
            position: relative;
        }

        .hero-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .main-title-img {
            max-width: 340px;
            width: 100%;
            height: auto;
            margin-bottom: 15px;
            filter: drop-shadow(0 8px 15px rgba(126,152,231,.1));
        }

        .hero-info p {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #6D7890;
            font-weight: 600;
        }

        .hero-avatar-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .avatar-circle-bg {
            position: absolute;
            width: 220px;
            height: 220px;
            background: #DCE4F9;
            border-radius: 50%;
            z-index: 1;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.03);
        }

        .hero-avatar-wrapper img {
            width: 120px;
            height: auto;
            position: relative;
            z-index: 2;
            pointer-events: none;
            animation: faviconPureBob 4s ease-in-out infinite;
        }

        @keyframes faviconPureBob {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }

        .hero-subcards {
            display: flex;
            flex-direction: column;
            gap: 16px;
            z-index: 3;
        }

        .info-subcard {
            background: rgba(255, 255, 255, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: 24px;
            padding: 20px 24px;
            box-shadow: 0 10px 25px rgba(119,136,187,0.04);
            transition: all 0.35s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .info-subcard:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.95);
            border-color: rgba(171, 192, 246, 0.6);
            box-shadow: 0 12px 28px rgba(171, 192, 246, 0.25);
        }

        .info-subcard h4 {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.05rem;
            font-weight: 500;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .info-subcard p {
            font-size: 0.88rem;
            color: #7A879E;
            line-height: 1.4;
        }

        /* ======================================================
           ROW 2: PRICING GRID
        ====================================================== */
        .pricing-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .price-card {
            background: rgba(255, 255, 255, 0.65);
            border: 1px solid rgba(255,
