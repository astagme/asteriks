<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asteriks ✦ Furry Art Studio</title>
<link rel="icon" type="image/png" href="asteriks.art/asteriksfav.png">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
<style>
    :root {
        --c1:#ABC0F6; --c2:#C7D6F7; --c3:#D5D9F2; --c4:#E4E2F8; --c5:#E1EDF6;
        --dark:#55627C; --white:#ffffff;
        --shadow: 0 20px 40px rgba(119,136,187,.15);
        --lavender-glow: 0 0 20px rgba(180, 160, 255, 0.3);
    }
    *{ margin:0; padding:0; box-sizing:border-box; }
    html{ scroll-behavior:smooth; }
    body{ font-family:'Nunito',sans-serif; color:var(--dark); background: linear-gradient(135deg,var(--c5),var(--c4),var(--c2)); min-height:100vh; }

    /* Компоненты с подсветкой */
    .feature-card, .price-card, .visual-card, .contact-box {
        background: rgba(255,255,255,.55);
        border-radius: 30px;
        box-shadow: var(--shadow), var(--lavender-glow);
        transition: .4s;
    }

    header{ position:fixed; top:20px; left:50%; transform:translateX(-50%); width:min(1200px,92%); z-index:999; }
    nav{ display:flex; justify-content:space-between; align-items:center; padding:18px 26px; border-radius:30px; background:rgba(255,255,255,.6); backdrop-filter:blur(18px); }
    .logo{ font-family:'Fredoka',sans-serif; font-size:1.3rem; font-weight:600; }
    .logo img { width:22px; vertical-align:middle; margin-left:5px; }

    section{ padding:120px 7%; }
    .hero{ min-height:80vh; display:flex; align-items:center; justify-content:center; }
    
    /* Шоукейс: две работы */
    .feature-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:30px; }
    .feature-card img{ width:100%; height:350px; object-fit:cover; border-radius:30px; }
    
    .pricing-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:20px; }
    .price-card{ padding:30px; }
    
    .contact-box{ text-align:center; padding:60px; }
    .socials{ display:flex; justify-content:center; gap:20px; margin-top:20px; }
    .socials a{ width:50px; height:50px; border-radius:15px; background:white; display:flex; align-items:center; justify-content:center; color:var(--dark); text-decoration:none; }
</style>
</head>
<body>

<header>
    <nav>
        <div class="logo">Asteriks <img src="asteriks.art/asteriksfav.png" alt="icon"></div>
        <div class="nav-links">
            <a href="#home">Home</a> | <a href="gallery.html">Gallery</a> | <a href="#pricing">Pricing</a>
        </div>
    </nav>
</header>

<section id="home" class="hero">
    <h1>Asteriks Furry Art Studio</h1>
</section>

<section>
    <h2 style="margin-bottom:30px;">Main Showcase</h2>
    <div class="feature-grid">
        <div class="feature-card"><img src="asteriks.art/asteriks4.png" alt="Art 1"></div>
        <div class="feature-card"><img src="asteriks.art/asteriks3.png" alt="Art 2"></div>
    </div>
</section>

<section id="pricing">
    <h2>Commission Types</h2>
    <div class="pricing-grid">
        <div class="price-card"><h3>Line Art</h3><p>Fullbody — $40</p></div>
        <div class="price-card"><h3>Flat Color</h3><p>Fullbody — $60</p></div>
        <div class="price-card"><h3>Light Shading</h3><p>Fullbody — $80+</p></div>
        <div class="price-card"><h3>Rendered</h3><p>Fullbody — $120+</p></div>
    </div>
</section>

<footer style="text-align:center; padding-bottom:30px;">
    © 2026 Asteriks <img src="asteriks.art/asteriksfav.png" style="width:15px;"> | All Rights Reserved
</footer>

</body>
</html>
